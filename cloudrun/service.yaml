apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: hogarparavenezuela-back
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "10"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: IMAGE_PLACEHOLDER
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: NODE_ENV
              value: production
            - name: MONGODB_URI
              value: MONGODB_URI_PLACEHOLDER
            - name: JWT_SECRET
              value: JWT_SECRET_PLACEHOLDER
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
  traffic:
    - percent: 100
      latestRevision: true
